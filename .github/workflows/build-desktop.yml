name: Build hollr Desktop

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build overlay renderer
        run: pnpm --filter @workspace/desktop run build:overlay

      - name: Compile Electron main process
        run: pnpm --filter @workspace/desktop run build:electron

      - name: Package Windows installer
        run: pnpm --filter @workspace/desktop run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: hollr-windows-installer
          path: artifacts/desktop/dist/*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/desktop/dist/*.exe
          name: hollr Desktop ${{ github.ref_name }}
          body: |
            ## hollr Desktop ${{ github.ref_name }}

            ### Installation
            1. Download `hollr-Setup.exe` below
            2. Run it (click "More info → Run anyway" on the Windows SmartScreen popup)
            3. hollr opens automatically and minimizes to your system tray

            ### Overlay
            Press **Ctrl+Shift+H** to toggle the in-game overlay.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install system deps for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libnss3 libxss1 libasound2

      - name: Build overlay renderer
        run: pnpm --filter @workspace/desktop run build:overlay

      - name: Compile Electron main process
        run: pnpm --filter @workspace/desktop run build:electron

      - name: Package Linux AppImage
        run: pnpm --filter @workspace/desktop run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: hollr-linux-appimage
          path: artifacts/desktop/dist/*.AppImage
          if-no-files-found: warn
