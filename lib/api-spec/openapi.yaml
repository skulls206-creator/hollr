openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: hollr.chat API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: Users
    description: User profile operations.
  - name: Servers
    description: Community server operations.
  - name: Channels
    description: Channel operations within a server.
  - name: Messages
    description: Message operations.
  - name: DirectMessages
    description: Direct message thread operations.
  - name: Members
    description: Server membership operations.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  # Storage
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve a private object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # Users
  /users/me:
    get:
      tags: [Users]
      operationId: getMyProfile
      summary: Get my user profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [Users]
      operationId: updateMyProfile
      summary: Update my user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # Servers
  /servers:
    get:
      tags: [Servers]
      operationId: listMyServers
      summary: List servers the current user belongs to
      responses:
        '200':
          description: List of servers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Server'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Servers]
      operationId: createServer
      summary: Create a new server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServerRequest'
      responses:
        '201':
          description: Server created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /servers/{serverId}:
    get:
      tags: [Servers]
      operationId: getServer
      summary: Get a server by ID
      parameters:
        - $ref: '#/components/parameters/ServerId'
      responses:
        '200':
          description: Server details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [Servers]
      operationId: updateServer
      summary: Update a server
      parameters:
        - $ref: '#/components/parameters/ServerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateServerRequest'
      responses:
        '200':
          description: Updated server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Servers]
      operationId: deleteServer
      summary: Delete a server
      parameters:
        - $ref: '#/components/parameters/ServerId'
      responses:
        '200':
          description: Server deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /servers/{serverId}/join:
    post:
      tags: [Servers]
      operationId: joinServer
      summary: Join a server by invite code
      parameters:
        - $ref: '#/components/parameters/ServerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinServerRequest'
      responses:
        '200':
          description: Joined server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
        '404':
          description: Invalid invite code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /servers/{serverId}/leave:
    post:
      tags: [Servers]
      operationId: leaveServer
      summary: Leave a server
      parameters:
        - $ref: '#/components/parameters/ServerId'
      responses:
        '200':
          description: Left server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /servers/{serverId}/invite:
    post:
      tags: [Servers]
      operationId: regenerateInvite
      summary: Regenerate server invite code
      parameters:
        - $ref: '#/components/parameters/ServerId'
      responses:
        '200':
          description: New invite code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteCode'

  # Members
  /servers/{serverId}/members:
    get:
      tags: [Members]
      operationId: listServerMembers
      summary: List members of a server
      parameters:
        - $ref: '#/components/parameters/ServerId'
      responses:
        '200':
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'

  # Channels
  /servers/{serverId}/channels:
    get:
      tags: [Channels]
      operationId: listChannels
      summary: List channels in a server
      parameters:
        - $ref: '#/components/parameters/ServerId'
      responses:
        '200':
          description: List of channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Channel'
    post:
      tags: [Channels]
      operationId: createChannel
      summary: Create a channel
      parameters:
        - $ref: '#/components/parameters/ServerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChannelRequest'
      responses:
        '201':
          description: Channel created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /servers/{serverId}/channels/{channelId}:
    patch:
      tags: [Channels]
      operationId: updateChannel
      summary: Update a channel
      parameters:
        - $ref: '#/components/parameters/ServerId'
        - $ref: '#/components/parameters/ChannelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChannelRequest'
      responses:
        '200':
          description: Updated channel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
    delete:
      tags: [Channels]
      operationId: deleteChannel
      summary: Delete a channel
      parameters:
        - $ref: '#/components/parameters/ServerId'
        - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Channel deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  # Messages
  /channels/{channelId}/messages:
    get:
      tags: [Messages]
      operationId: listMessages
      summary: List messages in a channel
      parameters:
        - $ref: '#/components/parameters/ChannelId'
        - name: before
          in: query
          required: false
          description: Cursor for pagination — fetch messages before this message ID
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Messages]
      operationId: sendMessage
      summary: Send a message to a channel
      parameters:
        - $ref: '#/components/parameters/ChannelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /channels/{channelId}/messages/{messageId}:
    patch:
      tags: [Messages]
      operationId: editMessage
      summary: Edit a message
      parameters:
        - $ref: '#/components/parameters/ChannelId'
        - $ref: '#/components/parameters/MessageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditMessageRequest'
      responses:
        '200':
          description: Message edited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Messages]
      operationId: deleteMessage
      summary: Delete a message
      parameters:
        - $ref: '#/components/parameters/ChannelId'
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: Message deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /channels/{channelId}/messages/search:
    get:
      tags: [Messages]
      operationId: searchMessages
      summary: Search messages in a channel
      parameters:
        - $ref: '#/components/parameters/ChannelId'
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Matching messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'

  # Direct Messages
  /dms:
    get:
      tags: [DirectMessages]
      operationId: listDmThreads
      summary: List all DM threads for current user
      responses:
        '200':
          description: List of DM threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DmThread'
    post:
      tags: [DirectMessages]
      operationId: openDmThread
      summary: Open or get a DM thread with another user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenDmRequest'
      responses:
        '200':
          description: DM thread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmThread'

  /dms/{threadId}/messages:
    get:
      tags: [DirectMessages]
      operationId: listDmMessages
      summary: List messages in a DM thread
      parameters:
        - $ref: '#/components/parameters/ThreadId'
        - name: before
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: List of DM messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
    post:
      tags: [DirectMessages]
      operationId: sendDmMessage
      summary: Send a message in a DM thread
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: DM message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
    ServerId:
      name: serverId
      in: path
      required: true
      schema:
        type: string
    ChannelId:
      name: channelId
      in: path
      required: true
      schema:
        type: string
    MessageId:
      name: messageId
      in: path
      required: true
      schema:
        type: string
    ThreadId:
      name: threadId
      in: path
      required: true
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    # Auth schemas
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    # Storage schemas
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    # User schemas
    User:
      type: object
      required: [id, username, displayName, createdAt]
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: [string, 'null']
        status:
          type: string
          enum: [online, idle, dnd, offline]
          default: offline
        customStatus:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
    UpdateUserRequest:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 32
        avatarUrl:
          type: [string, 'null']
        status:
          type: string
          enum: [online, idle, dnd, offline]
        customStatus:
          type: [string, 'null']
          maxLength: 128

    # Server schemas
    Server:
      type: object
      required: [id, name, ownerId, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: [string, 'null']
        iconUrl:
          type: [string, 'null']
        ownerId:
          type: string
        inviteCode:
          type: [string, 'null']
        memberCount:
          type: integer
        createdAt:
          type: string
          format: date-time
    CreateServerRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: [string, 'null']
          maxLength: 512
        iconUrl:
          type: [string, 'null']
    UpdateServerRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: [string, 'null']
          maxLength: 512
        iconUrl:
          type: [string, 'null']
    JoinServerRequest:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string
          minLength: 1
    InviteCode:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string

    # Member schemas
    Member:
      type: object
      required: [userId, serverId, role, joinedAt, user]
      properties:
        userId:
          type: string
        serverId:
          type: string
        role:
          type: string
          enum: [owner, admin, member]
        joinedAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'

    # Channel schemas
    Channel:
      type: object
      required: [id, serverId, name, type, position, createdAt]
      properties:
        id:
          type: string
        serverId:
          type: string
        name:
          type: string
        topic:
          type: [string, 'null']
        type:
          type: string
          enum: [text, voice]
        position:
          type: integer
        createdAt:
          type: string
          format: date-time
    CreateChannelRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        topic:
          type: [string, 'null']
          maxLength: 1024
        type:
          type: string
          enum: [text, voice]
    UpdateChannelRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        topic:
          type: [string, 'null']
          maxLength: 1024

    # Message schemas
    Message:
      type: object
      required: [id, content, authorId, createdAt, author]
      properties:
        id:
          type: string
        content:
          type: string
        authorId:
          type: string
        channelId:
          type: [string, 'null']
        dmThreadId:
          type: [string, 'null']
        edited:
          type: boolean
          default: false
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        author:
          $ref: '#/components/schemas/User'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 0
          maxLength: 4000
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/AttachmentInput'
    EditMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000

    # Attachment schemas
    Attachment:
      type: object
      required: [id, objectPath, name, contentType, size]
      properties:
        id:
          type: string
        objectPath:
          type: string
        name:
          type: string
        contentType:
          type: string
        size:
          type: integer
    AttachmentInput:
      type: object
      required: [objectPath, name, contentType, size]
      properties:
        objectPath:
          type: string
        name:
          type: string
        contentType:
          type: string
        size:
          type: integer

    # DM schemas
    DmThread:
      type: object
      required: [id, participants, createdAt]
      properties:
        id:
          type: string
        participants:
          type: array
          items:
            $ref: '#/components/schemas/User'
        lastMessage:
          oneOf:
            - $ref: '#/components/schemas/Message'
            - type: 'null'
        createdAt:
          type: string
          format: date-time
    OpenDmRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
