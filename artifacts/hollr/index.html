<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>hollr.chat | Chat &amp; Voice For All</title>
    <meta name="description" content="Real-time messaging, voice chat, and the full KHURK ecosystem — Ballpoint notes, Foldr files, and Playd music — in one beautiful app." />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="hollr.chat — Chat &amp; Voice For All" />

  <body>
    <script>
      try {
        var s = JSON.parse(localStorage.getItem('hollr-nav') || '{}');
        var t = (s.state && s.state.theme) || 'midnight';
        document.documentElement.setAttribute('data-theme', t);
      } catch(e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
