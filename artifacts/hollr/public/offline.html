<!DOCTYPE html>
<html lang="en" data-theme="ember">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>You're offline — hollr.chat</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A0D14;
      --surface: #13181F;
      --border: rgba(255,255,255,0.08);
      --primary: #6366f1;
      --fg: #e8eaf0;
      --muted: rgba(232,234,240,0.45);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: var(--primary);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      transform: rotate(-6deg);
      box-shadow: 0 16px 48px rgba(99,102,241,0.35);
    }
    .icon svg { transform: rotate(6deg); }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    p {
      color: var(--muted);
      font-size: 0.925rem;
      max-width: 320px;
      line-height: 1.55;
      margin-bottom: 32px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f87171;
      flex-shrink: 0;
    }
    button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 13px 28px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="icon">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </div>
  <h1>You're offline</h1>
  <p>No internet connection detected. Check your network and try again — hollr will pick up right where you left off.</p>
  <div class="badge">
    <span class="dot"></span>
    hollr.chat — no connection
  </div>
  <button onclick="window.location.reload()">Try again</button>
  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
